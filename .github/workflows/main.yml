name: download

on:
  workflow_dispatch:
    inputs:
      bookid:
        description: 'Fanqie book ID'
        required: true
      save_mode:
        description: 'Định dạng'
        required: false
        default: 'epub'
        type: choice
        options:
          - epub
          - txt

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v3

      - name: install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: install requirements
        run: pip install -r requirements.txt

      - name: restore cookie cache
        uses: actions/cache@v3
        with:
          path: src/data/
          key: fanqie-cookie-${{ github.run_id }}
          restore-keys: |
            fanqie-cookie-
            
      - name: clear old cookie
        run: rm -f src/data/cookie.json

      - name: run downloader
        run: python src/main.py ${{ github.event.inputs.bookid }} ${{ github.event.inputs.save_mode }}

      - name: upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: novel-${{ github.event.inputs.bookid }}
          path: downloads/
          retention-days: 7

      - name: save cookie cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: src/data/
          key: fanqie-cookie-${{ github.run_id }}
